# ============================================================
# Release Workflow
# Triggered when a version tag is pushed (e.g. v1.2.3).
#
# Tagging strategy:
#   v<major>.<minor>.<patch>         production release
#   v<major>.<minor>.<patch>-rc.<n>  release candidate
#
# Jobs:
#   1. validate       — sanity-check the tag format
#   2. backend-release — build and push Docker image tagged with semver
#   3. android-release — build signed release AAB
#   4. github-release  — create GitHub Release with attached artifacts
# ============================================================
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # e.g. v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+" # e.g. v1.2.3-rc.1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release build

permissions:
  contents: read

jobs:
  # ── 1. Validate Tag ─────────────────────────────────────────
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is-prerelease: ${{ steps.parse.outputs.is-prerelease }}
    steps:
      - name: Parse version from tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '\-rc\.'; then
            echo "is-prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Backend Release Build ─────────────────────────────────
  backend-release:
    name: Backend Release
    needs: validate
    uses: ./.github/workflows/backend-pipeline.yml
    with:
      java-version: "17"
      publish-artifacts: true
      docker-push: true
    secrets: inherit
    permissions:
      contents: read
      checks: write
      packages: write

  # ── 3. Android Release Build ─────────────────────────────────
  android-release:
    name: Android Release
    needs: validate
    uses: ./.github/workflows/android-pipeline.yml
    with:
      build-variant: release
      publish-artifacts: true
    secrets: inherit
    permissions:
      contents: read
      checks: write

  # ── 4. Create GitHub Release ─────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, backend-release, android-release]
    permissions:
      contents: write  # required to create releases and upload assets
    steps:
      - uses: actions/checkout@v4

      # Download the backend JAR artifact.
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: calmvest-backend-${{ github.sha }}
          path: release-assets/backend/

      # Download the Android AAB artifact.
      - name: Download android artifact
        uses: actions/download-artifact@v4
        with:
          name: calmvest-android-release-${{ github.sha }}
          path: release-assets/android/

      # Rename artifacts to include the version for clarity.
      - name: Rename artifacts
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mv release-assets/backend/*.jar  "release-assets/calmvest-backend-${VERSION}.jar"  2>/dev/null || true
          mv release-assets/android/*.aab  "release-assets/calmvest-android-${VERSION}.aab"  2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Calmvest ${{ needs.validate.outputs.version }}"
          prerelease: ${{ needs.validate.outputs.is-prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/calmvest-backend-*.jar
            release-assets/calmvest-android-*.aab
