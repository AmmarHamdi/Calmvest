# ============================================================
# Reusable Android Pipeline
# Called by ci.yml (debug builds on PRs) and release.yml
# (release bundles on version tags).
#
# ASSUMPTION: The android-app/ directory must contain a committed
# Gradle wrapper (gradlew + gradle/wrapper/). Generate it with:
#   cd android-app && gradle wrapper --gradle-version=8.7
# then commit gradlew, gradlew.bat, gradle/wrapper/gradle-wrapper.jar,
# and gradle/wrapper/gradle-wrapper.properties.
# ============================================================
name: Android Pipeline

on:
  workflow_call:
    inputs:
      build-variant:
        description: "Gradle build variant to assemble: 'debug' or 'release'"
        type: string
        default: debug
      publish-artifacts:
        description: Upload APK/AAB as a workflow artifact
        type: boolean
        default: false
    secrets:
      # Required only when build-variant = 'release'
      KEYSTORE_BASE64:
        description: Base64-encoded .jks keystore file
        required: false
      KEYSTORE_PASSWORD:
        description: Password for the keystore
        required: false
      KEY_ALIAS:
        description: Signing key alias
        required: false
      KEY_PASSWORD:
        description: Password for the signing key
        required: false
    outputs:
      artifact-name:
        description: Name of the uploaded APK/AAB artifact
        value: ${{ jobs.build.outputs.artifact-name }}

permissions:
  contents: read

jobs:
  # ── 1. Validate Gradle Wrapper ───────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper checksum
        uses: gradle/actions/wrapper-validation@v4

  # ── 2. Unit Tests ────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate-wrapper
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper   # uses android-app/gradle/wrapper/gradle-wrapper.properties
          build-root-directory: android-app
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # GitHub-hosted runners expose ANDROID_SDK_ROOT; create local.properties so Gradle can find it.
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties

      - name: Run Android unit tests
        working-directory: android-app
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Android Unit Tests
          path: "android-app/**/build/test-results/**/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload test reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-test-reports-${{ github.run_id }}
          path: android-app/**/build/reports/tests/
          retention-days: 7

  # ── 3. Build APK / AAB ──────────────────────────────────────
  build:
    name: Build ${{ inputs.build-variant == 'release' && 'Release AAB' || 'Debug APK' }}
    runs-on: ubuntu-latest
    needs: test
    outputs:
      artifact-name: calmvest-android-${{ inputs.build-variant }}-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          build-root-directory: android-app
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties

      # ── Signing setup (release only) ──────────────────────────
      # The keystore is stored as a base64-encoded GitHub Secret.
      # It is decoded to a temp file and referenced via keystore.properties.
      - name: Decode keystore
        if: inputs.build-variant == 'release'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/app/keystore.jks

      - name: Write keystore.properties
        if: inputs.build-variant == 'release'
        run: |
          cat > android-app/keystore.properties <<EOF
          storeFile=app/keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── Build ────────────────────────────────────────────────
      - name: Assemble debug APK
        if: inputs.build-variant == 'debug'
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      # Release builds produce an AAB (preferred for Play Store upload).
      - name: Bundle release AAB
        if: inputs.build-variant == 'release'
        working-directory: android-app
        run: ./gradlew bundleRelease --no-daemon

      # ── Clean up secrets from the runner filesystem ──────────
      - name: Remove keystore files
        if: always() && inputs.build-variant == 'release'
        run: |
          rm -f android-app/app/keystore.jks
          rm -f android-app/keystore.properties

      # ── Upload artifact ──────────────────────────────────────
      - name: Upload debug APK
        if: inputs.build-variant == 'debug' && inputs.publish-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calmvest-android-debug-${{ github.sha }}
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload release AAB
        if: inputs.build-variant == 'release' && inputs.publish-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calmvest-android-release-${{ github.sha }}
          path: android-app/app/build/outputs/bundle/release/*.aab
          retention-days: 30
