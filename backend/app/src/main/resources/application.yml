spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/calmvest}
    username: ${DATABASE_USER:calmvest}
    password: ${DATABASE_PASSWORD:calmvest}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
